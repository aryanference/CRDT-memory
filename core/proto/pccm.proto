syntax = "proto3";
package pccm;

service PCCMCore {
  rpc InsertNode(InsertNodeRequest) returns (InsertNodeResponse);
  rpc InsertEdge(InsertEdgeRequest) returns (InsertEdgeResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc GetContextChain(GetContextChainRequest) returns (GetContextChainResponse);
  rpc GetSyncStatus(GetSyncStatusRequest) returns (GetSyncStatusResponse);
  rpc StreamGraphUpdates(StreamRequest) returns (stream GraphEvent);
}

// ── InsertNode ────────────────────────────────────────────
message InsertNodeRequest {
  string agent_id = 1;
  string session_id = 2;
  string content = 3;
  string node_type = 4;            // "episodic" | "semantic" | "procedural"
  repeated string causal_parent_ids = 5;
  string edge_type_to_parents = 6; // default "causes"
  map<string, string> metadata = 7;
  repeated float embedding = 8;    // pre-computed embedding (optional)
}

message InsertNodeResponse {
  string node_id = 1;
  double activation_score = 2;
  bool success = 3;
  string error = 4;
}

// ── InsertEdge ────────────────────────────────────────────
message InsertEdgeRequest {
  string source_id = 1;
  string target_id = 2;
  string edge_type = 3;
  double weight = 4;
  string agent_id = 5;
}

message InsertEdgeResponse {
  string edge_id = 1;
  bool success = 2;
  string error = 3;
}

// ── Query ─────────────────────────────────────────────────
message QueryRequest {
  string query_text = 1;
  string agent_id = 2;
  float semantic_threshold = 3;    // default 0.75
  int32 max_nodes = 4;             // default 100
  int32 time_window_days = 5;      // default 7
  int64 query_time_center_ms = 6;  // 0 = use current time
  bool include_lateral_inhibition = 7; // default true
  repeated float query_embedding = 8;  // pre-computed embedding
}

message ActivatedNodeProto {
  string node_id = 1;
  string content = 2;
  double activation_score = 3;
  double temporal_score = 4;
  repeated string propagation_path = 5;
  bool was_inhibited = 6;
  string node_type = 7;
}

message QueryResponse {
  repeated ActivatedNodeProto activated_nodes = 1;
  int32 context_tokens_used = 2;
  int32 full_context_tokens_avoided = 3;
  double latency_ms = 4;
  int32 prefetch_cache_hits = 5;
}

// ── GetNode ───────────────────────────────────────────────
message GetNodeRequest {
  string node_id = 1;
}

message MemoryNodeProto {
  string id = 1;
  string content = 2;
  repeated float embedding = 3;
  string node_type = 4;
  uint64 created_at_ms = 5;
  uint64 last_accessed_ms = 6;
  repeated uint64 access_timestamps = 7;
  double activation_score = 8;
  string activation_state = 9;
  string agent_id = 10;
  string session_id = 11;
  map<string, string> metadata = 12;
}

message GetNodeResponse {
  MemoryNodeProto node = 1;
  bool found = 2;
}

// ── GetContextChain ───────────────────────────────────────
message GetContextChainRequest {
  string node_id = 1;
  int32 max_depth = 2;  // default 10
}

message GetContextChainResponse {
  string root_node_id = 1;
  repeated ActivatedNodeProto chain = 2;
  int32 total_nodes = 3;
}

// ── GetSyncStatus ─────────────────────────────────────────
message GetSyncStatusRequest {
  string swarm_id = 1;
}

message GetSyncStatusResponse {
  string swarm_id = 1;
  int32 agent_count = 2;
  int32 total_nodes = 3;
  int32 hot_nodes = 4;
  int32 dormant_nodes = 5;
  int64 last_gossip_ms = 6;
  map<string, int64> vector_clock = 7;
}

// ── StreamGraphUpdates ────────────────────────────────────
message StreamRequest {
  string agent_id = 1;
}

message GraphEvent {
  string event_type = 1;  // "node_added" | "edge_added" | "activation_changed" | "gossip_sync"
  string node_id = 2;
  string edge_id = 3;
  string agent_id = 4;
  double activation_score = 5;
  int64 timestamp_ms = 6;
  int32 delta_size_bytes = 7;  // for gossip_sync events
}
